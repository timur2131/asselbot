<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FuseCore Salon</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { position: relative; color: #4F46E5; }
        .active-tab::after { content: ''; position: absolute; bottom: -12px; left: 0; right: 0; height: 3px; background: #4F46E5; border-radius: 2px; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const App = () => {
            const [view, setView] = useState('client');
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            const [selectedService, setSelectedService] = useState('Стрижка');
            const [name, setName] = useState('');
            const [phone, setPhone] = useState('');
            const [comment, setComment] = useState('');
            const [bookings, setBookings] = useState([]);

            // ВСТАВЬ СЮДА СВОЮ ССЫЛКУ ИЗ NGROK (она меняется при каждом перезапуске)
            const API_BASE = "https://playgroup-baked-equator.ngrok-free.dev"; 

            useEffect(() => {
                window.Telegram?.WebApp?.ready();
                window.Telegram?.WebApp?.expand();
            }, []);

            const dates = Array.from({ length: 7 }, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() + i);
                return { day: d.toLocaleDateString('ru-RU', { weekday: 'short' }), date: d.getDate(), full: d.toLocaleDateString('ru-RU') };
            });

            const timeSlots = ["10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00"];

            const fetchBookings = useCallback(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/bookings`, { headers: { "ngrok-skip-browser-warning": "69420" } });
                    if (res.ok) { setBookings(await res.json()); }
                } catch (e) { console.error(e); }
            }, [API_BASE]);

            useEffect(() => {
                fetchBookings();
                const itv = setInterval(fetchBookings, 5000);
                return () => clearInterval(itv);
            }, [fetchBookings]);

            const handleBooking = async () => {
                if (!name || !phone || !selectedDate || !selectedTime) return alert("Заполните имя, телефон и выберите время!");
                
                const payload = {
                    name, phone, comment, service: selectedService,
                    time: `${selectedDate} ${selectedTime}`,
                    telegram_id: window.Telegram?.WebApp?.initDataUnsafe?.user?.id?.toString() || "000000"
                };
                
                try {
                    const res = await fetch(`${API_BASE}/api/book`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', "ngrok-skip-browser-warning": "69420" },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) {
                        window.Telegram?.WebApp?.showPopup({
                            title: 'Готово!',
                            message: 'Ваша заявка отправлена Асель.',
                            buttons: [{type: 'ok'}]
                        }, () => window.Telegram?.WebApp?.close());
                    } else {
                        alert("Сервер отклонил запрос. Проверь ngrok.");
                    }
                } catch (e) { alert("Ошибка связи с сервером. Проверь API_BASE в коде!"); }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-10">
                    <nav className="flex justify-around py-4 bg-white border-b sticky top-0 z-50 mb-6">
                        <button onClick={() => setView('client')} className={`text-[10px] font-black uppercase tracking-widest ${view === 'client' ? 'active-tab text-indigo-600' : 'text-gray-300'}`}>Запись</button>
                        <button onClick={() => setView('admin')} className={`text-[10px] font-black uppercase tracking-widest ${view === 'admin' ? 'active-tab text-indigo-600' : 'text-gray-300'}`}>Журнал</button>
                    </nav>

                    <div className="px-6">
                        {view === 'client' ? (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <h1 className="text-4xl font-black mb-1">Assel <span className="text-indigo-600">Bot</span></h1>
                                <p className="text-gray-400 text-sm mb-8 font-medium">Ваша запись в пару кликов</p>
                                
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-[2.5rem] card-shadow space-y-4">
                                        <input value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-semibold outline-none focus:ring-2 focus:ring-indigo-500/20" placeholder="Ваше имя" />
                                        <input value={phone} onChange={e => setPhone(e.target.value)} type="tel" className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-semibold outline-none focus:ring-2 focus:ring-indigo-500/20" placeholder="Номер телефона" />
                                    </div>

                                    <div className="bg-white p-6 rounded-[2.5rem] card-shadow">
                                        <div className="grid grid-cols-2 gap-4">
                                            {['Стрижка', 'Окрашивание'].map(s => (
                                                <button key={s} onClick={() => setSelectedService(s)} className={`p-6 rounded-[2rem] border-2 transition-all ${selectedService === s ? 'border-indigo-600 bg-indigo-50' : 'border-transparent bg-slate-50 text-gray-400'}`}>
                                                    <span className="text-2xl mb-2 block">{s === 'Стрижка' ? '✂️' : '🎨'}</span>
                                                    <span className="text-[10px] font-black uppercase">{s}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white p-6 rounded-[2.5rem] card-shadow">
                                        <div className="flex gap-3 overflow-x-auto no-scrollbar mb-4">
                                            {dates.map(d => (
                                                <button key={d.full} onClick={() => setSelectedDate(d.full)} className={`flex-shrink-0 w-14 h-16 rounded-2xl flex flex-col items-center justify-center ${selectedDate === d.full ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-gray-400'}`}>
                                                    <span className="text-[8px] uppercase font-black">{d.day}</span>
                                                    <span className="text-lg font-black">{d.date}</span>
                                                </button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-4 gap-2">
                                            {timeSlots.map(t => (
                                                <button key={t} onClick={() => setSelectedTime(t)} className={`py-3 rounded-xl text-[10px] font-bold ${selectedTime === t ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-gray-500'}`}>{t}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white p-6 rounded-[2.5rem] card-shadow">
                                        <textarea value={comment} onChange={e => setComment(e.target.value)} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-semibold min-h-[80px] resize-none outline-none focus:ring-2 focus:ring-indigo-500/20" placeholder="Комментарий (например: «как обычно»)"></textarea>
                                    </div>

                                    <button onClick={handleBooking} className="w-full bg-slate-900 text-white py-6 rounded-[2.5rem] font-bold shadow-2xl active:scale-95 transition-all">Записаться →</button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <h2 className="text-3xl font-black mb-8">Журнал</h2>
                                {bookings.map(b => (
                                    <div key={b.id} className="bg-white p-5 rounded-[2rem] card-shadow flex justify-between items-center border border-white">
                                        <div>
                                            <div className="font-black text-slate-800">{b.name}</div>
                                            <div className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">{b.time}</div>
                                        </div>
                                        <div className={`px-4 py-1.5 rounded-full text-[8px] font-black uppercase ${b.status === 'confirmed' ? 'bg-green-100 text-green-600' : (b.status === 'rejected' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600')}`}>
                                            {b.status === 'pending' ? 'Ждет' : (b.status === 'confirmed' ? 'Ок' : 'Нет')}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
