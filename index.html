<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FuseCore Salon</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-['Inter']">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('client');
            const [name, setName] = useState('');
            const [bookings, setBookings] = useState([]);
            
            // ПРОВЕРЬ ЭТУ ССЫЛКУ - ОНА ДОЛЖНА БЫТЬ ИЗ ТВОЕГО NGROK
            const API_BASE = "https://playgroup-baked-equator.ngrok-free.dev"; 

            const fetchBookings = async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/bookings`);
                    if (res.ok) {
                        const data = await res.json();
                        setBookings(data);
                    }
                } catch (e) { console.error("Ошибка связи с бэкендом"); }
            };

            useEffect(() => {
                fetchBookings();
                const timer = setInterval(fetchBookings, 5000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div class="max-w-md mx-auto min-h-screen pb-10">
                    <nav class="flex justify-around bg-white py-4 border-b sticky top-0 z-50 shadow-sm">
                        <button onClick={() => setView('client')} class={`font-bold ${view === 'client' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-400'}`}>Клиент</button>
                        <button onClick={() => setView('admin')} class={`font-bold ${view === 'admin' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-400'}`}>Админ</button>
                    </nav>

                    <div class="p-5">
                        {view === 'client' ? (
                            <div class="space-y-6">
                                <h1 class="text-2xl font-bold">Запись к Асель</h1>
                                <input value={name} onChange={e => setName(e.target.value)} class="w-full p-4 border rounded-2xl" placeholder="Твое имя..." />
                                <button onClick={async () => {
                                    await fetch(`${API_BASE}/api/book`, {
                                        method: 'POST',
                                        headers: {'Content-Type': 'application/json'},
                                        body: JSON.stringify({name, service: 'Стрижка', time: 'Сегодня 12:00', telegram_id: '0000'})
                                    });
                                    alert("Отправлено!");
                                    setName('');
                                }} class="w-full bg-black text-white py-4 rounded-2xl font-bold">Отправить тестовую запись</button>
                            </div>
                        ) : (
                            <div class="space-y-4">
                                <h2 class="text-xl font-bold">Журнал записей</h2>
                                {bookings.length > 0 ? bookings.map(b => (
                                    <div key={b.id} class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                                        <div>
                                            <div class="font-bold text-gray-800">{b.name}</div>
                                            <div class="text-xs text-indigo-500 font-bold uppercase">{b.time}</div>
                                            <div class="text-[10px] text-gray-400">{b.service}</div>
                                        </div>
                                        <div class={`px-3 py-1 rounded-full text-[10px] font-black uppercase ${b.status === 'confirmed' ? 'bg-green-100 text-green-600' : (b.status === 'rejected' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600')}`}>
                                            {b.status}
                                        </div>
                                    </div>
                                )) : <div class="text-center py-20 text-gray-400">Записей пока нет. Проверь ngrok!</div>}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
