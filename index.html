<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FuseCore Salon</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { position: relative; color: #4F46E5; }
        .active-tab::after { content: ''; position: absolute; bottom: -12px; left: 0; right: 0; height: 2px; background: #4F46E5; border-radius: 2px; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const App = () => {
            const [view, setView] = useState('client');
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            const [selectedService, setSelectedService] = useState('Стрижка');
            const [name, setName] = useState('');
            const [comment, setComment] = useState('');
            const [bookings, setBookings] = useState([]);

            const API_BASE = "https://playgroup-baked-equator.ngrok-free.dev"; 

            const dates = Array.from({ length: 7 }, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() + i);
                return { day: d.toLocaleDateString('ru-RU', { weekday: 'short' }), date: d.getDate(), full: d.toLocaleDateString('ru-RU') };
            });

            const timeSlots = ["10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00"];

            const fetchBookings = useCallback(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/bookings`, { headers: { "ngrok-skip-browser-warning": "69420" } });
                    if (res.ok) setBookings(await res.json());
                } catch (e) { console.error("Error"); }
            }, [API_BASE]);

            useEffect(() => {
                fetchBookings();
                const itv = setInterval(fetchBookings, 4000);
                return () => clearInterval(itv);
            }, [fetchBookings]);

            const handleBooking = async () => {
                if (!name || !selectedDate || !selectedTime) return alert("Заполните имя и время!");
                
                const payload = {
                    name, service: selectedService,
                    time: `${selectedDate} ${selectedTime}`,
                    comment: comment,
                    telegram_id: window.Telegram?.WebApp?.initDataUnsafe?.user?.id?.toString() || "000000"
                };
                
                try {
                    const res = await fetch(`${API_BASE}/api/book`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', "ngrok-skip-browser-warning": "69420" },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) {
                        alert("Запись отправлена!");
                        window.Telegram?.WebApp?.close();
                    }
                } catch (e) { alert("Ошибка сервера"); }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen">
                    <nav className="flex justify-around py-4 bg-white border-b sticky top-0 z-50 mb-4">
                        <button onClick={() => setView('client')} className={`text-sm font-bold ${view === 'client' ? 'active-tab' : 'text-gray-300'}`}>Клиент</button>
                        <button onClick={() => setView('admin')} className={`text-sm font-bold ${view === 'admin' ? 'active-tab' : 'text-gray-300'}`}>Журнал</button>
                    </nav>

                    <div className="px-5 pb-10">
                        {view === 'client' ? (
                            <div className="space-y-6 animate-in fade-in">
                                <h1 className="text-3xl font-black text-slate-900">Запись к Асель</h1>

                                <div className="bg-white p-5 rounded-[2rem] card-shadow">
                                    <label className="text-[10px] font-black text-gray-300 uppercase block mb-3 pl-1">Ваше имя</label>
                                    <input value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm font-semibold outline-none focus:ring-2 focus:ring-indigo-500/20" placeholder="Как вас зовут?" />
                                </div>

                                <div className="bg-white p-5 rounded-[2rem] card-shadow">
                                    <label className="text-[10px] font-black text-gray-300 uppercase block mb-3 pl-1">Услуга</label>
                                    <div className="flex gap-2">
                                        {['Стрижка', 'Окрашивание'].map(s => (
                                            <button key={s} onClick={() => setSelectedService(s)} className={`flex-1 py-4 rounded-xl text-[11px] font-bold transition-all border-2 ${selectedService === s ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-transparent bg-slate-50 text-gray-400'}`}>{s}</button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white p-5 rounded-[2rem] card-shadow">
                                    <label className="text-[10px] font-black text-gray-300 uppercase block mb-3 pl-1">Комментарий (необязательно)</label>
                                    <textarea value={comment} onChange={e => setComment(e.target.value)} className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm font-semibold outline-none focus:ring-2 focus:ring-indigo-500/20" rows="2" placeholder="Напр: Как обычно / Скину фото в чат"></textarea>
                                </div>

                                <div className="bg-white p-5 rounded-[2rem] card-shadow">
                                    <label className="text-[10px] font-black text-gray-300 uppercase block mb-3 pl-1">Когда придете?</label>
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar mb-4">
                                        {dates.map(d => (
                                            <button key={d.full} onClick={() => setSelectedDate(d.full)} className={`flex-shrink-0 w-14 h-16 rounded-xl flex flex-col items-center justify-center ${selectedDate === d.full ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'bg-slate-50 text-gray-400'}`}>
                                                <span className="text-[8px] font-black mb-1">{d.day}</span>
                                                <span className="text-sm font-black">{d.date}</span>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-4 gap-2">
                                        {timeSlots.map(t => (
                                            <button key={t} onClick={() => setSelectedTime(t)} className={`py-3 rounded-lg text-[10px] font-bold ${selectedTime === t ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-gray-500'}`}>{t}</button>
                                        ))}
                                    </div>
                                </div>

                                <button onClick={handleBooking} className="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-bold shadow-xl active:scale-[0.98] transition-all">Записаться</button>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-black mb-6">Журнал записей</h2>
                                {bookings.length > 0 ? bookings.map(b => (
                                    <div key={b.id} className="bg-white p-4 rounded-2xl card-shadow flex justify-between items-center">
                                        <div>
                                            <div className="font-bold text-slate-800 text-sm">{b.name}</div>
                                            <div className="text-[10px] text-indigo-500 font-bold uppercase">{b.time}</div>
                                        </div>
                                        <div className={`px-3 py-1 rounded-full text-[8px] font-black uppercase ${b.status === 'confirmed' ? 'bg-green-100 text-green-600' : (b.status === 'rejected' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600')}`}>
                                            {b.status === 'pending' ? 'Ждет' : (b.status === 'confirmed' ? 'Да' : 'Нет')}
                                        </div>
                                    </div>
                                )) : <div className="text-center py-20 text-gray-300">Пусто</div>}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
