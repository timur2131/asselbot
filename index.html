<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assel Studio</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-slate-50 font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            // Загружаем данные из памяти телефона
            const [name, setName] = useState(localStorage.getItem('user_name') || '');
            const [phone, setPhone] = useState(localStorage.getItem('user_phone') || '');
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            const [service, setService] = useState('Стрижка');
            const [comment, setComment] = useState('');
            const [busySlots, setBusySlots] = useState([]);

            // ОБЯЗАТЕЛЬНО ОБНОВЛЯЙ ЭТУ ССЫЛКУ ПОСЛЕ ПЕРЕЗАПУСКА NGROK!
            const API_BASE = "https://ВАША-НОВАЯ-ССЫЛКА.ngrok-free.dev"; 

            useEffect(() => {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                // Получаем занятые слоты с сервера
                fetch(`${API_BASE}/api/bookings`, { headers: {"ngrok-skip-browser-warning": "69420"} })
                    .then(r => r.json())
                    .then(data => setBusySlots(data));
            }, []);

            const handleBooking = async () => {
                if (!name || !phone || !selectedDate || !selectedTime) return alert("Заполни все поля!");
                
                // Сохраняем для следующего раза
                localStorage.setItem('user_name', name);
                localStorage.setItem('user_phone', phone);

                const fullTime = `${selectedDate} ${selectedTime}`;
                const payload = {
                    name, phone, service, comment, time: fullTime,
                    telegram_id: window.Telegram.WebApp.initDataUnsafe?.user?.id?.toString() || "000"
                };

                try {
                    const res = await fetch(`${API_BASE}/api/book`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json', "ngrok-skip-browser-warning": "69420"},
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) {
                        window.Telegram.WebApp.close();
                    }
                } catch (e) { alert("Ошибка! Проверь API_BASE."); }
            };

            const dates = Array.from({ length: 7 }, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() + i);
                return d.toLocaleDateString('ru-RU');
            });

            const times = ["10:00", "12:00", "14:00", "16:00", "18:00"];

            return (
                <div className="p-5 max-w-md mx-auto">
                    <h1 className="text-2xl font-black mb-6 uppercase tracking-tighter text-slate-800">Запись к Асель</h1>
                    
                    <div className="space-y-4">
                        <input value={name} onChange={e => setName(e.target.value)} placeholder="Ваше имя" className="w-full p-4 rounded-2xl bg-white shadow-sm outline-none" />
                        <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="Телефон" className="w-full p-4 rounded-2xl bg-white shadow-sm outline-none" />
                        
                        <div className="bg-white p-4 rounded-2xl shadow-sm">
                            <p className="text-[10px] font-bold text-gray-400 mb-3 uppercase">Услуга</p>
                            <div className="flex gap-2">
                                {['Стрижка', 'Окрашивание'].map(s => (
                                    <button key={s} onClick={() => setService(s)} className={`flex-1 p-3 rounded-xl font-bold text-xs ${service === s ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-400'}`}>{s}</button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-2xl shadow-sm">
                            <p className="text-[10px] font-bold text-gray-400 mb-3 uppercase">Дата</p>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                {dates.map(d => (
                                    <button key={d} onClick={() => setSelectedDate(d)} className={`flex-shrink-0 px-4 py-2 rounded-xl text-xs font-bold ${selectedDate === d ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-400'}`}>{d}</button>
                                ))}
                            </div>
                        </div>

                        {selectedDate && (
                            <div className="bg-white p-4 rounded-2xl shadow-sm grid grid-cols-3 gap-2 animate-in fade-in">
                                {times.map(t => {
                                    const isBusy = busySlots.includes(`${selectedDate} ${t}`);
                                    return (
                                        <button 
                                            key={t} 
                                            disabled={isBusy}
                                            onClick={() => setSelectedTime(t)} 
                                            className={`p-3 rounded-xl text-xs font-bold ${isBusy ? 'bg-gray-100 text-gray-300' : (selectedTime === t ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-500')}`}
                                        >
                                            {t} {isBusy ? '✖' : ''}
                                        </button>
                                    );
                                })}
                            </div>
                        )}

                        <textarea value={comment} onChange={e => setComment(e.target.value)} placeholder="Комментарий (необязательно)" className="w-full p-4 rounded-2xl bg-white shadow-sm outline-none h-24 resize-none" />

                        <button onClick={handleBooking} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-lg active:scale-95 transition-all">ЗАПИСАТЬСЯ</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
