<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FuseCore Salon</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; color: #1e293b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { position: relative; color: #4F46E5; }
        .active-tab::after { content: ''; position: absolute; bottom: -12px; left: 0; right: 0; height: 3px; background: #4F46E5; border-radius: 2px; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        input, textarea { outline: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const App = () => {
            const [view, setView] = useState('client');
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            const [selectedService, setSelectedService] = useState('Стрижка');
            const [name, setName] = useState('');
            const [phone, setPhone] = useState('');
            const [comment, setComment] = useState('');
            const [bookings, setBookings] = useState([]);

            const API_BASE = "https://playgroup-baked-equator.ngrok-free.dev"; 

            useEffect(() => {
                window.Telegram?.WebApp?.ready();
                window.Telegram?.WebApp?.expand();
            }, []);

            const dates = Array.from({ length: 7 }, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() + i);
                return { day: d.toLocaleDateString('ru-RU', { weekday: 'short' }), date: d.getDate(), full: d.toLocaleDateString('ru-RU') };
            });

            const timeSlots = ["10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00"];

            const fetchBookings = useCallback(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/bookings`, { headers: { "ngrok-skip-browser-warning": "69420" } });
                    if (res.ok) { setBookings(await res.json()); }
                } catch (e) { console.error(e); }
            }, [API_BASE]);

            useEffect(() => {
                fetchBookings();
                const itv = setInterval(fetchBookings, 5000);
                return () => clearInterval(itv);
            }, [fetchBookings]);

            const handleBooking = async () => {
                if (!name || !phone || !selectedDate || !selectedTime) return alert("Пожалуйста, заполните имя, телефон и выберите время!");
                
                const payload = {
                    name, phone, service: selectedService, comment,
                    time: `${selectedDate} ${selectedTime}`,
                    telegram_id: window.Telegram?.WebApp?.initDataUnsafe?.user?.id?.toString() || "000000"
                };
                
                try {
                    const res = await fetch(`${API_BASE}/api/book`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', "ngrok-skip-browser-warning": "69420" },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) {
                        window.Telegram?.WebApp?.showPopup({
                            title: 'Успешно!',
                            message: 'Ваша заявка отправлена. Мастер скоро подтвердит её.',
                            buttons: [{type: 'ok'}]
                        }, () => window.Telegram?.WebApp?.close());
                    }
                } catch (e) { alert("Ошибка связи с сервером"); }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#F9FAFB]">
                    <nav className="flex justify-around py-4 bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
                        <button onClick={() => setView('client')} className={`text-xs font-black tracking-widest uppercase transition-all ${view === 'client' ? 'active-tab text-indigo-600' : 'text-gray-300'}`}>Запись</button>
                        <button onClick={() => setView('admin')} className={`text-xs font-black tracking-widest uppercase transition-all ${view === 'admin' ? 'active-tab text-indigo-600' : 'text-gray-300'}`}>Журнал</button>
                    </nav>

                    <div className="px-6 py-8">
                        {view === 'client' ? (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <h1 className="text-4xl font-black mb-1 text-slate-900">Assel <span className="text-indigo-600">Studio</span></h1>
                                <p className="text-gray-400 text-sm mb-10 font-medium">Безупречность в каждой детали</p>
                                
                                <div className="space-y-6">
                                    {/* Блок контактов */}
                                    <div className="bg-white p-6 rounded-[2.5rem] card-shadow space-y-4">
                                        <div className="relative">
                                            <input value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-semibold focus:ring-2 focus:ring-indigo-500/20" placeholder="Ваше имя" />
                                        </div>
                                        <div className="relative">
                                            <input value={phone} onChange={e => setPhone(e.target.value)} type="tel" className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-semibold focus:ring-2 focus:ring-indigo-500/20" placeholder="Номер телефона" />
                                        </div>
                                    </div>

                                    {/* Услуги */}
                                    <div className="bg-white p-6 rounded-[2.5rem] card-shadow">
                                        <label className="text-[10px] font-black text-gray-300 uppercase tracking-widest block mb-4 ml-2">Что выбираем?</label>
                                        <div className="grid grid-cols-2 gap-4">
                                            {['Стрижка', 'Окрашивание'].map(s => (
                                                <button key={s} onClick={() => setSelectedService(s)} className={`p-6 rounded-[2rem] border-2 transition-all flex flex-col items-center ${selectedService === s ? 'border-indigo-600 bg-indigo-50/50' : 'border-transparent bg-slate-50 text-gray-400'}`}>
                                                    <span className="text-2xl mb-2">{s === 'Стрижка' ? '✂️' : '🎨'}</span>
                                                    <span className="text-[11px] font-black uppercase">{s}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Календарь */}
                                    <div className="bg-white p-6 rounded-[2.5rem] card-shadow">
                                        <div className="flex gap-3 overflow-x-auto no-scrollbar mb-6 pb-2">
                                            {dates.map(d => (
                                                <button key={d.full} onClick={() => setSelectedDate(d.full)} className={`flex-shrink-0 w-16 h-20 rounded-2xl flex flex-col items-center justify-center transition-all ${selectedDate === d.full ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200 scale-105' : 'bg-slate-50 text-gray-400'}`}>
                                                    <span className="text-[9px] uppercase font-black mb-1">{d.day}</span>
                                                    <span className="text-lg font-black">{d.date}</span>
                                                </button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-4 gap-2">
                                            {timeSlots.map(t => (
                                                <button key={t} onClick={() => setSelectedTime(t)} className={`py-3 rounded-xl text-[11px] font-bold transition-all ${selectedTime === t ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-gray-500'}`}>{t}</button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Комментарий */}
                                    <div className="bg-white p-6 rounded-[2.5rem] card-shadow">
                                        <textarea value={comment} onChange={e => setComment(e.target.value)} className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-semibold min-h-[100px] resize-none focus:ring-2 focus:ring-indigo-500/20" placeholder="Комментарий (например: мне как обычно или хочу что-то новое)"></textarea>
                                    </div>

                                    <button onClick={handleBooking} className="w-full bg-slate-900 text-white py-6 rounded-[2.5rem] font-bold shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3">
                                        <span>Записаться</span>
                                        <span className="text-xl">→</span>
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="animate-in fade-in slide-in-from-right-4 duration-500">
                                <h2 className="text-3xl font-black mb-8 text-slate-900">Журнал</h2>
                                <div className="space-y-4">
                                    {bookings.length > 0 ? bookings.map(b => (
                                        <div key={b.id} className="bg-white p-5 rounded-[2rem] card-shadow flex justify-between items-center border border-white">
                                            <div className="flex gap-4 items-center">
                                                <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-xl">{b.service === 'Стрижка' ? '✂️' : '🎨'}</div>
                                                <div>
                                                    <div className="font-black text-slate-800 text-sm">{b.name}</div>
                                                    <div className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">{b.time}</div>
                                                </div>
                                            </div>
                                            <div className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase ${b.status === 'confirmed' ? 'bg-green-100 text-green-600' : (b.status === 'rejected' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600')}`}>
                                                {b.status === 'pending' ? 'Ждет' : (b.status === 'confirmed' ? 'Ок' : 'Нет')}
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="text-center py-20 bg-white rounded-[2.5rem] card-shadow">
                                            <p className="text-gray-300 font-bold">Пока тут пусто</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
