<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FuseCore Salon</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { position: relative; color: #4F46E5; }
        .active-tab::after { content: ''; position: absolute; bottom: -12px; left: 0; right: 0; height: 2px; background: #4F46E5; border-radius: 2px; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const App = () => {
            const [view, setView] = useState('client');
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            const [selectedService, setSelectedService] = useState('Стрижка');
            const [name, setName] = useState('');
            const [bookings, setBookings] = useState([]);

            const API_BASE = "https://playgroup-baked-equator.ngrok-free.dev"; 

            const dates = Array.from({ length: 7 }, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() + i);
                return { day: d.toLocaleDateString('ru-RU', { weekday: 'short' }), date: d.getDate(), full: d.toLocaleDateString('ru-RU') };
            });

            const timeSlots = ["10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00"];

            const fetchBookings = useCallback(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/bookings`, {
                        headers: { "ngrok-skip-browser-warning": "69420" }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setBookings(data);
                    }
                } catch (e) { console.error("Fetch error"); }
            }, [API_BASE]);

            useEffect(() => {
                fetchBookings();
                const itv = setInterval(fetchBookings, 4000);
                return () => clearInterval(itv);
            }, [fetchBookings]);

            const handleBooking = async () => {
                if (!name || !selectedDate || !selectedTime) return alert("Заполни всё!");
                const payload = {
                    name, service: selectedService,
                    time: `${selectedDate} ${selectedTime}`,
                    telegram_id: window.Telegram?.WebApp?.initDataUnsafe?.user?.id?.toString() || "000000"
                };
                try {
                    const res = await fetch(`${API_BASE}/api/book`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            "ngrok-skip-browser-warning": "69420"
                        },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) {
                        alert("Запись создана!");
                        setName(''); setSelectedDate(null); setSelectedTime(null);
                        fetchBookings();
                    }
                } catch (e) { alert("Ошибка бэкенда"); }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen">
                    <nav className="flex justify-around py-4 bg-white border-b sticky top-0 z-50 mb-6">
                        <button onClick={() => setView('client')} className={`text-sm font-bold transition-all ${view === 'client' ? 'active-tab' : 'text-gray-300'}`}>Клиент</button>
                        <button onClick={() => setView('admin')} className={`text-sm font-bold transition-all ${view === 'admin' ? 'active-tab' : 'text-gray-300'}`}>Админ</button>
                    </nav>

                    <div className="px-5 pb-10">
                        {view === 'client' ? (
                            <div className="animate-in fade-in duration-500">
                                <h1 className="text-4xl font-black mb-1 text-slate-900">Привет, <span className="text-indigo-600">Асель</span></h1>
                                <p className="text-gray-400 text-sm mb-8 font-medium">Твой стиль начинается здесь</p>
                                
                                <div className="space-y-8">
                                    <div className="bg-white p-6 rounded-[2.5rem] card-shadow">
                                        <label className="text-[10px] font-black text-gray-300 uppercase tracking-[0.2em] block mb-4">Персональные данные</label>
                                        <div className="relative">
                                            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-xl">😊</span>
                                            <input value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-50 border-none rounded-2xl p-4 pl-12 text-sm font-semibold outline-none focus:ring-2 focus:ring-indigo-500/20" placeholder="Как вас зовут?" />
                                        </div>
                                    </div>

                                    <div className="bg-white p-6 rounded-[2.5rem] card-shadow">
                                        <label className="text-[10px] font-black text-gray-300 uppercase tracking-[0.2em] block mb-4">Что делаем?</label>
                                        <div className="grid grid-cols-2 gap-4">
                                            {['Стрижка', 'Окрашивание'].map(s => (
                                                <button key={s} onClick={() => setSelectedService(s)} className={`p-6 rounded-[2rem] transition-all flex flex-col items-center justify-center border-2 ${selectedService === s ? 'border-indigo-600 bg-indigo-50/50' : 'border-transparent bg-slate-50 text-gray-400'}`}>
                                                    <span className="text-2xl mb-2">{s === 'Стрижка' ? '✂️' : '🎨'}</span>
                                                    <span className="text-[11px] font-bold uppercase tracking-tight">{s}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white p-6 rounded-[2.5rem] card-shadow">
                                        <label className="text-[10px] font-black text-gray-300 uppercase tracking-[0.2em] block mb-4">Когда удобно?</label>
                                        <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2 mb-4">
                                            {dates.map(d => (
                                                <button key={d.full} onClick={() => setSelectedDate(d.full)} className={`flex-shrink-0 w-16 h-20 rounded-2xl flex flex-col items-center justify-center transition-all ${selectedDate === d.full ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'bg-slate-50 text-gray-400'}`}>
                                                    <span className="text-[9px] uppercase font-black mb-1">{d.day}</span>
                                                    <span className="text-lg font-black">{d.date}</span>
                                                </button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-4 gap-2">
                                            {timeSlots.map(t => (
                                                <button key={t} onClick={() => setSelectedTime(t)} className={`py-3 rounded-xl text-[11px] font-bold transition-all ${selectedTime === t ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-50 text-gray-500'}`}>{t}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <button onClick={handleBooking} className="w-full bg-slate-900 text-white py-6 rounded-[2.5rem] font-bold shadow-2xl shadow-slate-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                                        <span>Создать запись</span>
                                        <span className="text-xl">→</span>
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="animate-in slide-in-from-right duration-500">
                                <h2 className="text-3xl font-black mb-8 text-slate-900">Журнал</h2>
                                <div className="space-y-4">
                                    {bookings.length > 0 ? bookings.map(b => (
                                        <div key={b.id} className="bg-white p-5 rounded-[2rem] card-shadow flex justify-between items-center border border-white">
                                            <div className="flex gap-4 items-center">
                                                <div className="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl">{b.service === 'Стрижка' ? '✂️' : '🎨'}</div>
                                                <div>
                                                    <div className="font-black text-slate-800">{b.name}</div>
                                                    <div className="text-[10px] font-bold text-indigo-500 uppercase tracking-wider">{b.time}</div>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-end gap-2">
                                                <div className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest ${b.status === 'confirmed' ? 'bg-green-100 text-green-600' : (b.status === 'rejected' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600')}`}>
                                                    {b.status === 'pending' ? 'Ждет' : (b.status === 'confirmed' ? 'Ок' : 'Нет')}
                                                </div>
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="text-center py-20 bg-white rounded-[3rem] card-shadow">
                                            <p className="text-gray-300 font-bold">Записей пока нет</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
